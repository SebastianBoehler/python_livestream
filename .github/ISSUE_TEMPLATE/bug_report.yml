name: Bug report
description: Report a reproducible problem in the livestream pipeline
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: input
    id: backend
    attributes:
      label: Capture backend
      placeholder: playwright, screen, or virtual-screen
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: macOS, Ubuntu VM, Docker on Linux, etc.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Include FFmpeg speed, latency, queue, or provider errors if available
    validations:
      required: false
