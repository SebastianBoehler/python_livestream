name: Feature request
description: Suggest an improvement to the streaming system
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operational or product problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Performance, provider, budget, latency, or deployment constraints
    validations:
      required: false
