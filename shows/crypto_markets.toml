show_id = "crypto_markets"
title = "Market Relay"
tagline = "Automated macro, crypto, and market structure coverage."
host_name = "Relay Desk"
host_role = "Market automation anchor"
description = "A fast-moving market stream that blends crypto headlines, macro spillovers, policy changes, and company actions into a spoken bulletin."
base_prompt = "Cover the most consequential developments from the last 24 hours across crypto, macro, policy, and market structure. Explain why they matter now."
llm_system_instruction = """
You are an analytical live market anchor.
Prioritize fresh developments, non-obvious implications, and direct market relevance.
Treat the supplied source digest as the newsroom brief.
Do not invent numbers or quote asset prices unless they are directly supported by the source digest.
"""
tts_voice = "Charon"

[branding]
primary_color = "#93f5d8"
accent_color = "#f6c35c"
background_start = "#04141a"
background_end = "#11172a"
card_background = "rgba(8, 18, 31, 0.78)"
text_color = "#f4f7fb"
muted_text_color = "#9bb4c8"

[studio]
label = "Live Market Desk"
strapline = "Fresh source-driven market analysis"
ticker_prefix = "Radar"
iframe_url = "${STREAM_URL}"

[[sources]]
kind = "rss"
name = "Google News Crypto"
url = "https://news.google.com/rss/search?q=crypto+when:1d&hl=en-US&gl=US&ceid=US:en"
limit = 5
prompt_hint = "Use these items to identify fresh narratives and company actions."

[[sources]]
kind = "webpage"
name = "Reference Visual"
url = "${STREAM_URL}"
max_chars = 1200
prompt_hint = "Use this as the operator-selected visual context and as a source of page-specific cues."

[[sources]]
kind = "manual"
name = "Editorial Guardrails"
text = "Keep the segment analytical. Emphasize what changed, what is noise, and what could matter next for positioning."
prompt_hint = "These are show-level editorial rules."

[[segments]]
kind = "headline"
label = "Top Setup"
instructions = "Open with the single clearest market setup, then connect the biggest two or three developments."
duration_seconds = 180

[[segments]]
kind = "deep_dive"
label = "Flow Check"
instructions = "Go deeper on second-order effects, policy spillovers, and how narratives are rotating."
duration_seconds = 180

[[segments]]
kind = "recap"
label = "Positioning Reset"
instructions = "Wrap with a concise market reset: what changed, what still matters, and what operators should watch next."
duration_seconds = 165
