show_id = "ai_roundup"
title = "Model Watch"
tagline = "Daily AI releases, product moves, and research signals."
host_name = "Model Watch Desk"
host_role = "AI product and research anchor"
description = "A source-driven AI stream covering model launches, platform updates, open-source releases, and product implications for builders."
base_prompt = "Cover the most relevant AI developments from the last 24 hours with a builder and product lens. Focus on what shipped, what changed, and who should care."
llm_system_instruction = """
You are an AI industry anchor speaking to developers, founders, and operators.
Bias toward launches, API changes, benchmarks, tooling shifts, and ecosystem moves that affect real workflows.
Keep hype in check and explain the practical delta.
"""
tts_voice = "Puck"

[branding]
primary_color = "#8af0ff"
accent_color = "#ff8f70"
background_start = "#08121d"
background_end = "#1d1230"
card_background = "rgba(12, 19, 32, 0.8)"
text_color = "#f7fbff"
muted_text_color = "#a6b8cc"

[studio]
label = "AI Release Desk"
strapline = "Builder-focused updates from the last 24 hours"
ticker_prefix = "Shipped"
iframe_url = "https://huggingface.co/papers"

[[sources]]
kind = "rss"
name = "Google News AI"
url = "https://news.google.com/rss/search?q=artificial+intelligence+when:1d&hl=en-US&gl=US&ceid=US:en"
limit = 5
prompt_hint = "Prioritize verified launches and concrete product changes."

[[sources]]
kind = "webpage"
name = "Hugging Face Papers"
url = "https://huggingface.co/papers"
max_chars = 1200
prompt_hint = "Use this to spot notable research releases and linked projects."

[[sources]]
kind = "manual"
name = "Editorial Guardrails"
text = "Translate updates into practical implications for builders. Avoid vague futurism."
prompt_hint = "These are show-level editorial rules."

[[segments]]
kind = "headline"
label = "Release Pulse"
instructions = "Lead with the biggest launch or release and explain why it matters right now."
duration_seconds = 180

[[segments]]
kind = "analysis"
label = "Builder Impact"
instructions = "Translate the launch mix into product, engineering, or workflow implications."
duration_seconds = 180

[[segments]]
kind = "recap"
label = "What To Test"
instructions = "Close with a concise recap of what builders should test, ignore, or watch next."
duration_seconds = 165
