show_id = "hb_capital"
title = "HB Capital Live Desk"
tagline = "A crypto market channel built around the HB Capital terminal."
host_name = "HB Capital Desk"
host_role = "Crypto macro and market structure anchor"
description = "A live crypto news channel format that rotates between branded desk scenes, a clean HB Capital live feed, and short transition states so the stream feels like a proper continuous market desk."
base_prompt = "Cover the most consequential crypto and macro developments from the last 24 hours for traders watching the HB Capital terminal. Explain what changed, why it matters, and what to watch next."
llm_system_instruction = """
You are anchoring HB Capital's crypto livestream.
Sound sharp, analytical, and market-aware.
Use the source digest as the working newsroom brief and keep the commentary useful for active traders.
Prefer concrete developments, policy shifts, flow changes, and positioning cues over vague headlines.
Treat the show like a continuous live desk with scene handoffs, short resets, and direct references to what is on the terminal.
"""
tts_voice = "Charon"

[branding]
primary_color = "#171717"
accent_color = "#b48a3f"
background_start = "#f8f7f4"
background_end = "#eef2f6"
card_background = "rgba(255, 255, 255, 0.82)"
text_color = "#171717"
muted_text_color = "#6b7280"

[studio]
label = "HB Capital Control Room"
strapline = "Crypto market desk with live terminal and scene rotation"
ticker_prefix = "HB Wire"
iframe_url = "${STREAM_URL}"
layout_mode = "overlay"

[[sources]]
kind = "rss"
name = "Google News Crypto"
url = "https://news.google.com/rss/search?q=crypto+bitcoin+ethereum+when:1d&hl=en-US&gl=US&ceid=US:en"
limit = 5
prompt_hint = "Use these items to surface fresh crypto headlines and company actions."

[[sources]]
kind = "rss"
name = "Google News Macro"
url = "https://news.google.com/rss/search?q=fed+rates+inflation+macro+when:1d&hl=en-US&gl=US&ceid=US:en"
limit = 4
prompt_hint = "Use these items for macro spillovers that can move crypto positioning."

[[sources]]
kind = "webpage"
name = "HB Capital Livestream"
url = "${STREAM_URL}"
max_chars = 1600
prompt_hint = "Use the HB Capital livestream page as the on-screen terminal context and pick up any visible cues."

[[sources]]
kind = "manual"
name = "Editorial Guardrails"
text = "Keep the segment grounded in price structure, catalysts, and positioning. Frame each package like a live desk handoff, not a generic explainer."
prompt_hint = "These are HB Capital editorial rules."

[[segments]]
kind = "transition"
label = "Opening Bell"
instructions = "Open the channel with the dominant market setup, the live tone of the desk, and the first catalyst the audience should care about."
duration_seconds = 30
scene_mode = "transition"

[[segments]]
kind = "headline"
label = "Market Open"
instructions = "Lead with the single clearest market setup, then connect it to the two most consequential crypto or macro catalysts visible on the desk."
duration_seconds = 180
scene_mode = "overlay"

[[segments]]
kind = "live_feed"
label = "Terminal Live"
instructions = "Stay close to the HB Capital live page and call out only the most important shift on tape, structure, or market narrative. Keep the read tight and observational."
duration_seconds = 120
scene_mode = "clean-feed"

[[segments]]
kind = "deep_dive"
label = "Desk Drilldown"
instructions = "Use the live terminal context to go deeper on flow, positioning, rotation, or policy spillovers."
duration_seconds = 180
scene_mode = "overlay"

[[segments]]
kind = "transition"
label = "Catalyst Reset"
instructions = "Bridge into the next block by naming the next catalyst, the risk to the current view, and whether the desk is leaning risk-on or risk-off."
duration_seconds = 24
scene_mode = "transition"

[[segments]]
kind = "analysis"
label = "Flow Board"
instructions = "Translate the current setup into practical watch points across majors, macro spillovers, and market structure so traders know what matters next."
duration_seconds = 165
scene_mode = "overlay"

[[segments]]
kind = "recap"
label = "Close Notes"
instructions = "Close with a concise recap of the active setup, the risk to that view, and the next catalyst on deck."
duration_seconds = 150
scene_mode = "overlay"
