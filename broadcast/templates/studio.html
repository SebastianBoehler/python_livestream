<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{PAGE_TITLE}}</title>
  <style>{{STYLE_BLOCK}}</style>
</head>
<body class="{{BODY_CLASS}}">
  <div class="frame">
    <header class="topbar">
      <div class="show-meta">
        <div class="kicker">{{SHOW_LABEL}}</div>
        <div class="title">{{SHOW_TITLE}}</div>
        <div class="strapline">{{SHOW_STRAPLINE}}</div>
      </div>
      <div class="host-badge">
        <div class="host-avatar">{{HOST_INITIALS}}</div>
        <div>
          <div>{{HOST_NAME}}</div>
          <div class="host">{{HOST_ROLE}}</div>
          <div class="clock" id="clock">--:-- UTC</div>
        </div>
      </div>
    </header>
    <main class="content">
      <section class="hero">
        {{IFRAME_MARKUP}}
        <div class="headline-block">
          <div class="segment-label">{{SEGMENT_LABEL}}</div>
          <h1 class="headline">{{HEADLINE}}</h1>
        </div>
        <ul class="points">{{POINTS_MARKUP}}</ul>
      </section>
      <aside class="sidebar">
        <h2>Source Radar</h2>
        {{SOURCE_CARDS}}
      </aside>
    </main>
    <footer class="ticker">
      <div class="ticker-label">{{TICKER_PREFIX}}</div>
      <div class="ticker-track">{{TICKER_TRACK}}</div>
    </footer>
  </div>
  <script>
    const clock = document.getElementById("clock");
    const renderClock = () => {
      if (!clock) {
        return;
      }
      clock.textContent = new Date().toLocaleString("en-GB", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        timeZoneName: "short",
        hour12: false
      });
    };
    renderClock();
    setInterval(renderClock, 1000);
  </script>
</body>
</html>
