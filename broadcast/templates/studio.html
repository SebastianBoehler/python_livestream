<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{PAGE_TITLE}}</title>
  <style>
    :root {
      --primary: {{PRIMARY_COLOR}};
      --accent: {{ACCENT_COLOR}};
      --bg-start: {{BACKGROUND_START}};
      --bg-end: {{BACKGROUND_END}};
      --card: {{CARD_BACKGROUND}};
      --text: {{TEXT_COLOR}};
      --muted: {{MUTED_TEXT_COLOR}};
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.12), transparent 28%),
        linear-gradient(135deg, var(--bg-start), var(--bg-end));
      overflow: hidden;
    }
    .frame {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
      padding: 24px 28px 18px;
      gap: 18px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }
    .show-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .kicker {
      color: var(--accent);
      font-size: 15px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .title {
      font-size: 44px;
      line-height: 1;
      font-weight: 700;
    }
    .strapline, .host, .clock {
      color: var(--muted);
    }
    .host-badge {
      padding: 12px 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(8, 11, 20, 0.28);
      backdrop-filter: blur(20px);
      min-width: 250px;
    }
    .content {
      display: grid;
      grid-template-columns: minmax(0, 1.8fr) minmax(300px, 0.95fr);
      gap: 18px;
      min-height: 0;
    }
    .hero, .sidebar {
      border-radius: 28px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(24px);
      overflow: hidden;
    }
    .hero {
      position: relative;
      display: grid;
      grid-template-rows: auto auto 1fr;
      min-height: 0;
    }
    .headline-block {
      padding: 28px 30px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      z-index: 1;
    }
    .segment-label {
      display: inline-flex;
      align-self: flex-start;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 12px;
    }
    .headline {
      font-size: 42px;
      line-height: 1.08;
      max-width: 16ch;
      margin: 0;
    }
    .points {
      list-style: none;
      padding: 0 30px 28px;
      margin: 0;
      display: grid;
      gap: 14px;
      z-index: 1;
    }
    .points li {
      padding: 16px 18px;
      border-left: 3px solid var(--accent);
      background: rgba(255,255,255,0.05);
      border-radius: 18px;
      font-size: 18px;
      line-height: 1.35;
    }
    .iframe-shell {
      position: absolute;
      inset: 0;
      opacity: 0.18;
      pointer-events: none;
    }
    .iframe-shell iframe {
      width: 100%;
      height: 100%;
      border: 0;
      filter: saturate(0.9) contrast(1.05);
    }
    .sidebar {
      padding: 22px;
      display: grid;
      align-content: start;
      gap: 14px;
      overflow: hidden;
    }
    .sidebar h2 {
      margin: 0;
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }
    .source-card {
      padding: 16px 16px 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      display: grid;
      gap: 8px;
    }
    .source-card.compact {
      color: var(--muted);
    }
    .source-card .name {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
    }
    .source-card .item-title {
      font-size: 20px;
      line-height: 1.2;
    }
    .source-card .item-summary {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }
    .ticker {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 22px;
      border-radius: 18px;
      background: rgba(6, 10, 20, 0.45);
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
    }
    .ticker-label {
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .ticker-track {
      white-space: nowrap;
      font-size: 18px;
      animation: ticker-scroll 36s linear infinite;
    }
    .ticker-divider {
      color: var(--accent);
      margin: 0 14px;
    }
    @keyframes ticker-scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
  </style>
</head>
<body>
  <div class="frame">
    <header class="topbar">
      <div class="show-meta">
        <div class="kicker">{{SHOW_LABEL}}</div>
        <div class="title">{{SHOW_TITLE}}</div>
        <div class="strapline">{{SHOW_STRAPLINE}}</div>
      </div>
      <div class="host-badge">
        <div>{{HOST_NAME}}</div>
        <div class="host">{{HOST_ROLE}}</div>
        <div class="clock" id="clock">--:-- UTC</div>
      </div>
    </header>
    <main class="content">
      <section class="hero">
        {{IFRAME_MARKUP}}
        <div class="headline-block">
          <div class="segment-label">{{SEGMENT_LABEL}}</div>
          <h1 class="headline">{{HEADLINE}}</h1>
        </div>
        <ul class="points">{{POINTS_MARKUP}}</ul>
      </section>
      <aside class="sidebar">
        <h2>Source Radar</h2>
        {{SOURCE_CARDS}}
      </aside>
    </main>
    <footer class="ticker">
      <div class="ticker-label">{{TICKER_PREFIX}}</div>
      <div class="ticker-track">{{TICKER_TRACK}}</div>
    </footer>
  </div>
  <script>
    const clock = document.getElementById("clock");
    const renderClock = () => {
      clock.textContent = new Date().toLocaleString("en-GB", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        timeZoneName: "short",
        hour12: false
      });
    };
    renderClock();
    setInterval(renderClock, 1000);
  </script>
</body>
</html>
